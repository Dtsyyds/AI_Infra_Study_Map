name: Month01 Agent Runtime CI

on:
  - push
  - pull_request

permissions:
  contents: read

jobs:
  test:
    runs-on: Ubuntu 24.04
    timeout-minutes: 10

    defaults:
      run:
        working-directory: month01_agent_loop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
          cache: pip
          cache-dependency-path: month01_agent_loop/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Check Python syntax
        run: compileall

      - name: Run unit tests
        run: pytest

      - name: Run deterministic stability evaluation
        env:
          LLM_MODE: fake
        run: eval_stability.py